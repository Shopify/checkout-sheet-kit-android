query FetchCollection($handle: String!, $numProducts: Int!) {
  collection(handle: $handle) {
    id
    handle
    title
    description
    image {
      url
      altText
      width
      height
    }
    products(first: $numProducts) {
      edges {
        node {
          id
          title
          description
          priceRange {
            minVariantPrice {
              amount
              currencyCode
            }
            maxVariantPrice {
              amount
              currencyCode
            }
          }
          featuredImage {
            url
            width
            height
            altText
          }
        }
      }
    }
  }
}
