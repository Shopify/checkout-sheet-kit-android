query FetchProduct($productId: ID!, $numVariants: Int!) {
  product(id: $productId) {
    id
    title
    description
    vendor
    featuredImage {
      url
      width
      height
      altText
    }
    priceRange {
      minVariantPrice {
        amount
        currencyCode
      }
      maxVariantPrice {
        amount
        currencyCode
      }
    }
    variants(first: $numVariants) {
      nodes {
        id
        title
        availableForSale
        price {
          amount
          currencyCode
        }
        selectedOptions {
          name
          value
        }
      }
    }
  }
}
